<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc" rx="24"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="Arial" fill="#0f172a" font-weight="700">Choosing Between Machine Learning and Deep Learning</text>
  <g font-family="Arial" text-anchor="middle">
    <rect x="420" y="80" width="360" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="600" y="132" font-size="26" fill="#1e293b" font-weight="700">Is your data mostly structured?</text>

    <rect x="170" y="250" width="300" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="320" y="302" font-size="24" fill="#1e293b" font-weight="700">Use Machine Learning</text>

    <rect x="730" y="250" width="300" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="880" y="290" font-size="23" fill="#1e293b" font-weight="700">Do you have a large dataset</text>
    <text x="880" y="318" font-size="23" fill="#1e293b" font-weight="700">and enough compute?</text>

    <rect x="650" y="450" width="300" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="800" y="502" font-size="24" fill="#1e293b" font-weight="700">Use Deep Learning</text>

    <rect x="950" y="450" width="180" height="90" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1040" y="487" font-size="22" fill="#1e293b" font-weight="700">Start with</text>
    <text x="1040" y="515" font-size="22" fill="#1e293b" font-weight="700">Machine Learning</text>
  </g>
  <g stroke="#6366f1" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M600 170 L600 210 L320 210 L320 245"/>
    <path d="M600 170 L600 210 L880 210 L880 245"/>
    <path d="M880 340 L880 395 L800 395 L800 445"/>
    <path d="M880 340 L880 395 L1040 395 L1040 445"/>
  </g>
  <g fill="#334155" font-family="Arial" font-size="22" font-weight="700">
    <text x="385" y="205">Yes</text>
    <text x="740" y="205">No</text>
    <text x="820" y="390">Yes</text>
    <text x="970" y="390">No</text>
  </g>
</svg>