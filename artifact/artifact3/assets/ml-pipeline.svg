<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <rect width="1200" height="320" fill="#f8fafc" rx="24"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="Arial" fill="#0f172a" font-weight="700">Machine Learning Pipeline</text>
  <g font-family="Arial" text-anchor="middle">
    <rect x="60" y="105" width="220" height="120" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="170" y="152" font-size="24" fill="#1e293b" font-weight="700">Input Data</text>
    <text x="170" y="184" font-size="18" fill="#475569">Structured features</text>
    <text x="170" y="208" font-size="18" fill="#475569">numbers, labels</text>

    <rect x="340" y="105" width="220" height="120" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="450" y="152" font-size="24" fill="#1e293b" font-weight="700">Feature Selection</text>
