    <line x1="415" y1="245" x2="480" y2="225" stroke="#94a3b8" stroke-width="2"/>

    <rect x="610" y="110" width="220" height="130" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
