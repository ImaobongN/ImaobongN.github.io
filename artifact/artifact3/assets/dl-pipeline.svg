<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <rect width="1200" height="360" fill="#f8fafc" rx="24"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="Arial" fill="#0f172a" font-weight="700">Neural Network / Deep Learning Pipeline</text>
  <g font-family="Arial" text-anchor="middle">
    <rect x="40" y="110" width="180" height="130" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="130" y="160" font-size="24" fill="#1e293b" font-weight="700">Input</text>
    <text x="130" y="192" font-size="18" fill="#475569">image, text,</text>
    <text x="130" y="216" font-size="18" fill="#475569">audio, numbers</text>

    <rect x="290" y="92" width="250" height="166" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="415" y="130" font-size="24" fill="#1e293b" font-weight="700">Hidden Layers</text>
    <circle cx="350" cy="180" r="18" fill="#c7d2fe"/>
    <circle cx="350" cy="225" r="18" fill="#c7d2fe"/>
    <circle cx="415" cy="155" r="18" fill="#a5b4fc"/>
    <circle cx="415" cy="200" r="18" fill="#a5b4fc"/>
    <circle cx="415" cy="245" r="18" fill="#a5b4fc"/>
    <circle cx="480" cy="180" r="18" fill="#818cf8"/>
    <circle cx="480" cy="225" r="18" fill="#818cf8"/>
    <line x1="350" y1="180" x2="415" y2="155" stroke="#94a3b8" stroke-width="2"/>
    <line x1="350" y1="180" x2="415" y2="200" stroke="#94a3b8" stroke-width="2"/>
    <line x1="350" y1="180" x2="415" y2="245" stroke="#94a3b8" stroke-width="2"/>
    <line x1="350" y1="225" x2="415" y2="155" stroke="#94a3b8" stroke-width="2"/>
    <line x1="350" y1="225" x2="415" y2="200" stroke="#94a3b8" stroke-width="2"/>
    <line x1="350" y1="225" x2="415" y2="245" stroke="#94a3b8" stroke-width="2"/>
    <line x1="415" y1="155" x2="480" y2="180" stroke="#94a3b8" stroke-width="2"/>
    <line x1="415" y1="155" x2="480" y2="225" stroke="#94a3b8" stroke-width="2"/>
    <line x1="415" y1="200" x2="480" y2="180" stroke="#94a3b8" stroke-width="2"/>
    <line x1="415" y1="200" x2="480" y2="225" stroke="#94a3b8" stroke-width="2"/>
