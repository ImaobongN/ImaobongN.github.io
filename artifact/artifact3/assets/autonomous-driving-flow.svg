<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <rect width="1200" height="360" fill="#f8fafc" rx="24"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="Arial" fill="#0f172a" font-weight="700">Autonomous Driving Example</text>
  <g font-family="Arial" text-anchor="middle">
    <rect x="40" y="110" width="250" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="165" y="150" font-size="24" fill="#1e293b" font-weight="700">Camera Input</text>
    <text x="165" y="190" font-size="20" fill="#475569">Road image</text>
    <text x="165" y="218" font-size="20" fill="#475569">lanes, signs, cars</text>

    <rect x="360" y="110" width="290" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="505" y="150" font-size="24" fill="#1e293b" font-weight="700">Deep Learning Model</text>
    <text x="505" y="190" font-size="20" fill="#475569">Detects patterns and objects</text>
    <text x="505" y="218" font-size="20" fill="#475569">from visual data</text>

    <rect x="720" y="110" width="210" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="825" y="150" font-size="24" fill="#1e293b" font-weight="700">Detection</text>
    <text x="825" y="190" font-size="20" fill="#475569">Pedestrian</text>
    <text x="825" y="218" font-size="20" fill="#475569">Lane / Vehicle</text>

    <rect x="1000" y="110" width="160" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1080" y="150" font-size="24" fill="#1e293b" font-weight="700">Decision</text>
    <text x="1080" y="190" font-size="20" fill="#475569">Brake</text>
    <text x="1080" y="218" font-size="20" fill="#475569">Turn / Go</text>
  </g>
  <g stroke="#6366f1" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M295 185 L350 185"/>
    <path d="M655 185 L710 185"/>
    <path d="M935 185 L990 185"/>
  </g>
  <g fill="#6366f1">
    <polygon points="350,185 335,176 335,194"/>
    <polygon points="710,185 695,176 695,194"/>
    <polygon points="990,185 975,176 975,194"/>
  </g>
</svg>