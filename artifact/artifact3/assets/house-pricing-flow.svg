<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340">
  <rect width="1200" height="340" fill="#f8fafc" rx="24"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-family="Arial" fill="#0f172a" font-weight="700">House Price Prediction Example</text>
  <g font-family="Arial" text-anchor="middle">
    <rect x="50" y="105" width="280" height="140" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="190" y="145" font-size="24" fill="#1e293b" font-weight="700">Inputs</text>
    <text x="190" y="180" font-size="20" fill="#475569">Square footage</text>
    <text x="190" y="208" font-size="20" fill="#475569">Location</text>
    <text x="190" y="236" font-size="20" fill="#475569">Bedrooms / Bathrooms</text>

    <rect x="455" y="105" width="290" height="140" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="600" y="145" font-size="24" fill="#1e293b" font-weight="700">Machine Learning Model</text>
    <text x="600" y="182" font-size="20" fill="#475569">Learns relationships between</text>
    <text x="600" y="210" font-size="20" fill="#475569">features and sale price</text>

    <rect x="870" y="105" width="280" height="140" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1010" y="145" font-size="24" fill="#1e293b" font-weight="700">Output</text>
    <text x="1010" y="190" font-size="22" fill="#475569">Estimated House Price</text>
  </g>
  <g stroke="#6366f1" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M335 175 L445 175"/>
    <path d="M750 175 L860 175"/>
  </g>
  <g fill="#6366f1">
    <polygon points="445,175 430,166 430,184"/>
    <polygon points="860,175 845,166 845,184"/>
  </g>
</svg>