<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200" role="img" aria-labelledby="title desc">
  <title id="title">The Evolution of AI timeline</title>
  <desc id="desc">A visually rich timeline showing major AI milestones from 1950 to the present.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 64px 'Arial', sans-serif; fill:#0f172a; }
      .subtitle { font: 500 28px 'Arial', sans-serif; fill:#334155; }
      .year { font: 700 30px 'Arial', sans-serif; fill:#1e293b; }
      .cardtitle { font: 700 26px 'Arial', sans-serif; fill:#0f172a; }
      .body { font: 400 22px 'Arial', sans-serif; fill:#334155; }
      .small { font: 600 20px 'Arial', sans-serif; fill:#475569; }
    </style>
  </defs>

  <rect width="1600" height="2200" fill="url(#bg)"/>
  <text x="800" y="105" text-anchor="middle" class="title">The Evolution of AI</text>
  <text x="800" y="152" text-anchor="middle" class="subtitle">From the Turing Test to multimodal AI</text>

  <line x1="800" y1="240" x2="800" y2="2060" stroke="url(#line)" stroke-width="10" stroke-linecap="round"/>

  <!-- cards -->
  <g filter="url(#shadow)">
    <rect x="170" y="260" rx="26" ry="26" width="520" height="170" fill="#ffffff"/>
    <circle cx="800" cy="345" r="18" fill="#7c3aed"/>
    <text x="200" y="318" class="year">1950</text>
    <text x="200" y="355" class="cardtitle">Alan Turing</text>
    <text x="200" y="392" class="body">Asked, “Can machines think?” and introduced</text>
    <text x="200" y="420" class="body">the Turing Test as a benchmark for intelligence.</text>

    <rect x="910" y="390" rx="26" ry="26" width="520" height="170" fill="#ffffff"/>
    <circle cx="800" cy="475" r="18" fill="#2563eb"/>
    <text x="940" y="448" class="year">1956</text>
    <text x="940" y="485" class="cardtitle">Dartmouth Conference</text>
    <text x="940" y="522" class="body">John McCarthy coined the term Artificial</text>
    <text x="940" y="550" class="body">Intelligence and shaped the field’s identity.</text>

    <rect x="170" y="520" rx="26" ry="26" width="520" height="170" fill="#ffffff"/>
    <circle cx="800" cy="605" r="18" fill="#7c3aed"/>
    <text x="200" y="578" class="year">1966</text>
    <text x="200" y="615" class="cardtitle">ELIZA</text>
    <text x="200" y="652" class="body">One of the first chatbots showed how simple</text>
    <text x="200" y="680" class="body">rules could create human-like conversation.</text>

    <rect x="910" y="650" rx="26" ry="26" width="520" height="190" fill="#fff7ed"/>
    <circle cx="800" cy="745" r="18" fill="#f97316"/>
    <text x="940" y="708" class="year">1974–1980</text>
    <text x="940" y="745" class="cardtitle">First AI Winter</text>
    <text x="940" y="782" class="body">Funding dropped as early promises outpaced</text>
    <text x="940" y="810" class="body">what limited computing power could deliver.</text>

    <rect x="170" y="830" rx="26" ry="26" width="520" height="170" fill="#ffffff"/>
    <circle cx="800" cy="915" r="18" fill="#7c3aed"/>
    <text x="200" y="888" class="year">1986</text>
    <text x="200" y="925" class="cardtitle">Backpropagation</text>
    <text x="200" y="962" class="body">A key training method for neural networks</text>
    <text x="200" y="990" class="body">became the backbone of deep learning.</text>

    <rect x="910" y="960" rx="26" ry="26" width="520" height="190" fill="#fff7ed"/>
    <circle cx="800" cy="1055" r="18" fill="#f97316"/>
    <text x="940" y="1018" class="year">1987–1993</text>
    <text x="940" y="1055" class="cardtitle">Second AI Winter</text>
    <text x="940" y="1092" class="body">Expert systems proved expensive, rigid, and</text>
    <text x="940" y="1120" class="body">difficult to scale in real-world settings.</text>

    <rect x="170" y="1140" rx="26" ry="26" width="520" height="170" fill="#ffffff"/>
    <circle cx="800" cy="1225" r="18" fill="#7c3aed"/>
    <text x="200" y="1198" class="year">1997</text>
    <text x="200" y="1235" class="cardtitle">Deep Blue</text>
    <text x="200" y="1272" class="body">IBM defeated chess champion Garry Kasparov,</text>
    <text x="200" y="1300" class="body">marking a symbolic turning point for AI.</text>

    <rect x="910" y="1270" rx="26" ry="26" width="520" height="170" fill="#ffffff"/>
    <circle cx="800" cy="1355" r="18" fill="#2563eb"/>
    <text x="940" y="1328" class="year">2011</text>
    <text x="940" y="1365" class="cardtitle">IBM Watson</text>
    <text x="940" y="1402" class="body">Watson won on Jeopardy!, showcasing major</text>
    <text x="940" y="1430" class="body">progress in language and retrieval systems.</text>

    <rect x="170" y="1450" rx="26" ry="26" width="520" height="170" fill="#ecfeff"/>
    <circle cx="800" cy="1535" r="18" fill="#0891b2"/>
    <text x="200" y="1508" class="year">2012</text>
    <text x="200" y="1545" class="cardtitle">AlexNet</text>
    <text x="200" y="1582" class="body">Deep learning won ImageNet by a huge margin,</text>
    <text x="200" y="1610" class="body">powered by GPUs and large-scale data.</text>

    <rect x="910" y="1580" rx="26" ry="26" width="520" height="170" fill="#ecfeff"/>
    <circle cx="800" cy="1665" r="18" fill="#0891b2"/>
    <text x="940" y="1638" class="year">2017</text>
    <text x="940" y="1675" class="cardtitle">Transformers</text>
    <text x="940" y="1712" class="body">Attention-based models transformed language</text>
    <text x="940" y="1740" class="body">AI and became the base of modern LLMs.</text>

    <rect x="170" y="1760" rx="26" ry="26" width="520" height="170" fill="#eff6ff"/>
    <circle cx="800" cy="1845" r="18" fill="#2563eb"/>
    <text x="200" y="1818" class="year">2022–2023</text>
    <text x="200" y="1855" class="cardtitle">Generative AI boom</text>
    <text x="200" y="1892" class="body">ChatGPT and other models brought AI into</text>
    <text x="200" y="1920" class="body">daily work, learning, and creative tools.</text>

    <rect x="910" y="1890" rx="26" ry="26" width="520" height="170" fill="#eef2ff"/>
    <circle cx="800" cy="1975" r="18" fill="#4f46e5"/>
    <text x="940" y="1948" class="year">Today</text>
    <text x="940" y="1985" class="cardtitle">Multimodal AI era</text>
    <text x="940" y="2022" class="body">AI now handles text, image, audio, and video</text>
    <text x="940" y="2050" class="body">while expanding into agents and automation.</text>
  </g>

  <rect x="190" y="2095" rx="18" ry="18" width="1220" height="70" fill="#ffffff" opacity="0.88"/>
  <text x="800" y="2140" text-anchor="middle" class="small">Key theme: AI advanced through cycles of ambition, setbacks, stronger computing power, and breakthrough architectures.</text>
</svg>
